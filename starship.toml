format = """
[Ôçô  ](fg:blue)\
$directory\
$php\
$nodejs\
$rust\
$python\
$git_branch\
$git_status\
$php\
$nodejs\
$rust\
$python\
\n$character"""

[directory]
format = "[$path](fg:bright-black)"
truncation_length = 3
truncation_symbol = "ÓçÑ/"

[git_branch]
symbol = " Ôêò"
format = ' [$symbol](fg:red) [$branch](fg:bright-black)'

[git_status]
format = '[$all_status$ahead_behind](fg:bright-black)'

[nodejs]
symbol = " Óúò"
format = ' [$symbol](fg:red) [$version](fg:bright-black)'

[rust]
symbol = " Óû®"
format = ' [$symbol](fg:purple) [$version](fg:bright-black)'

[python]
symbol = " Óúº"
format = ' [$symbol](fg:cyan) [$version $virtualenv](fg:bright-black)'

[php]
symbol = " Óòà"
format = ' [$symbol](fg:blue) [$version](fg:bright-black)'
